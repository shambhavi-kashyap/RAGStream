apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: polyglot-rag
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
      - name: llm-gateway
        image: your-dockerhub-user/llm-gateway:latest 
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: engine-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: polyglot-rag
spec:
  type: LoadBalancer
  selector:
    app: llm-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000