global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spring-boot-ingestion-worker'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'fastapi-llm-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']